site_name: InfraLynx Documentation
site_description: Enterprise documentation for the InfraLynx infrastructure platform.
site_url: https://super8four.github.io/infralynx-docs/
repo_name: Super8Four/infralynx-docs
repo_url: https://github.com/Super8Four/infralynx-docs
edit_uri: ""

theme:
  name: material
  logo: null
  favicon: null
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to InfraLynx dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.action.edit

extra_css:
  - stylesheets/branding.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Product:
      - Overview: product/overview.md
  - Engineering:
      - Architecture: engineering/architecture.md
      - Platform Repository: engineering/platform-repository.md
      - Database Abstraction: engineering/database-abstraction.md
      - Core Domain Architecture: engineering/core-domain-architecture.md
      - Authentication Model: engineering/auth-model.md
      - RBAC Model: engineering/rbac-model.md
      - IPAM Data Model: engineering/ipam-data-model.md
      - IPAM Validation Rules: engineering/ipam-validation.md
      - IPAM Allocation Logic: engineering/ipam-allocation.md
      - DCIM Data Model: engineering/dcim-data-model.md
      - DCIM Physical Relationships: engineering/dcim-physical-relationships.md
      - Rack Modeling: engineering/rack-modeling.md
      - UI Architecture: engineering/ui-architecture.md
      - Cross-Domain Relationships: engineering/cross-domain-relationships.md
      - Cross-Domain Data Flows: engineering/cross-domain-flows.md
      - Cross-Domain Validation: engineering/cross-domain-validation.md
      - Topology Model: engineering/topology-model.md
      - Path Tracing Logic: engineering/path-tracing-logic.md
      - L2 vs L3 Handling: engineering/l2-vs-l3-handling.md
  - Operations:
      - Deployment: operations/deployment.md
      - CI/CD: operations/ci-cd.md
      - Database Testing: operations/database-testing.md
  - API:
      - Overview: api/overview.md
  - Releases:
      - Release Notes: releases/index.md
  - ADR:
      - Overview: adr/index.md
      - ADR Template: adr/adr-template.md
      - ADR-0003 Documentation Foundation: adr/ADR-0003-documentation-foundation.md
      - ADR-0004 Design System Standardization: adr/ADR-0004-design-system-standardization.md
      - ADR-0005 Platform Monorepo Foundation: adr/ADR-0005-platform-monorepo-foundation.md
      - ADR-0006 CI Baseline: adr/ADR-0006-ci-baseline.md
      - ADR-0007 Database Abstraction Design: adr/ADR-0007-database-abstraction-design.md
      - ADR-0008 Core Domain Skeleton: adr/ADR-0008-core-domain-skeleton.md
      - ADR-0009 IPAM Domain Design: adr/ADR-0009-ipam-domain-design.md
      - ADR-0010 DCIM Domain Design: adr/ADR-0010-dcim-domain-design.md
      - ADR-0011 UI Shell Architecture: adr/ADR-0011-ui-shell-architecture.md
      - ADR-0012 Cross-Domain Integration Model: adr/ADR-0012-cross-domain-integration-model.md
      - ADR-0013 Network Modeling Engine: adr/ADR-0013-network-modeling-engine.md
  - Design:
      - Branding: design/branding.md
