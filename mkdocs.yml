site_name: InfraLynx Documentation
site_description: Enterprise documentation for the InfraLynx infrastructure platform.
site_url: https://super8four.github.io/infralynx-docs/
repo_name: Super8Four/infralynx-docs
repo_url: https://github.com/Super8Four/infralynx-docs
edit_uri: ""

theme:
  name: material
  logo: null
  favicon: null
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to InfraLynx dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.action.edit

extra_css:
  - stylesheets/branding.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true

